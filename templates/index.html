<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whiskey Creek &middot; Live Gauge</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="status-bar">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Connecting to gauge feed&hellip;</span>
    </div>

    <div class="error-banner" id="error-banner"></div>

    <div class="hero">
      <p class="hero-label">Water Level &middot; Whiskey Creek</p>
      <p class="hero-readout" id="readout">
        &mdash;<span class="unit">ft</span>
      </p>
      <p class="hero-meta" id="readout-meta">Waiting for first reading&hellip;</p>
    </div>

    <div class="chart-panel">
      <div id="chart"></div>
    </div>

  

  <script>
    window.__REFRESH_MS__ = {{ refresh_ms }};
  </script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
