name: mirror.yml

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Ensure directories exist
      - name: Create data directories
        run: |
          mkdir -p data/raw
          mkdir -p data/processed

      # Fetch datasets
      - name: Fetch measurement data
        run: python scripts/fetch_uncw_02.py

      # Show generated files for debugging
      - name: List generated files
        run: |
          echo "RAW DATA:"
          ls -lah data/raw || true

          echo ""
          echo "PROCESSED DATA:"
          ls -lah data/processed || true

      # Commit updated data
      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/

          git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M') UTC" || echo "No changes to commit"

          git push
