name: Mirror measured.csv from NOAA-Data-Pipeline-V2

# This workflow belongs in the do-not-hit-the-bridge (public) repo.
# It pulls data/raw/measured.csv from the private NOAA-Data-Pipeline-V2
# repo using a read-only PAT, and commits it here as data/measured.csv
# so the (anonymous, token-free) web app can fetch it from
# raw.githubusercontent.com.

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch: {}       # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write

 fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Ensure directories exist
      - name: Create data directories
        run: |
          mkdir -p data/raw
      

      # Fetch datasets
      
      - name: Fetch measurement data
        run: python scripts/fetch_uncw_02.py

      # Show generated files for debugging
      - name: List generated files
        run: |
          echo "RAW DATA:"
          ls -lah data/raw || true

          echo ""
          echo "PROCESSED DATA:"
          ls -lah data/processed || true

      # Commit updated data
      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/

          git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M') UTC" || echo "No changes to commit"

          git push
