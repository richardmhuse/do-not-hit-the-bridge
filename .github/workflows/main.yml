name: Mirror measured.csv from NOAA-Data-Pipeline-V2

# This workflow belongs in the do-not-hit-the-bridge (public) repo.
# It pulls data/raw/measured.csv from the private NOAA-Data-Pipeline-V2
# repo using a read-only PAT, and commits it here as data/measured.csv
# so the (anonymous, token-free) web app can fetch it from
# raw.githubusercontent.com.

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch: {}       # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo (do-not-hit-the-bridge)
        uses: actions/checkout@v4

      - name: Checkout measured.csv from the private data repo
        uses: actions/checkout@v4
        with:
          repository: richardmhuse/NOAA-Data-Pipeline-V2
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          sparse-checkout: |
            data/raw/measured.csv
          sparse-checkout-cone-mode: false
          path: source-data

      - name: Copy measured.csv into this repo
        run: |
          set -euo pipefail
          if [ ! -f source-data/data/raw/measured.csv ]; then
            echo "::error::measured.csv not found at data/raw/measured.csv in the source repo"
            exit 1
          fi
          mkdir -p data
          cp source-data/data/raw/measured.csv data/measured.csv

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "measured-csv-mirror-bot"
          git config user.email "actions@users.noreply.github.com"

          if git diff --quiet -- data/measured.csv; then
            echo "No changes to mirror."
            exit 0
          fi

          git add data/measured.csv
          git commit -m "Mirror measured.csv ($(date -u +'%Y-%m-%dT%H:%M:%SZ'))"
          git push
